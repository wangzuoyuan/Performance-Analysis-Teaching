name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端测试（pytest）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # 测试用数据目录，避免落到 ~/.exam-tracker
      # 注意：job 级 env 只能用 github 上下文，runner.* 仅在 step 内可用
      EXAM_TRACKER_DIR: ${{ github.workspace }}/.ci/exam-data
      EXAM_TRACKER_BACKUP_DIR: ${{ github.workspace }}/.ci/exam-backups
    steps:
      - uses: actions/checkout@v7

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx

      - name: 准备数据目录
        run: mkdir -p "$EXAM_TRACKER_DIR" "$EXAM_TRACKER_BACKUP_DIR"

      - name: 运行测试
        run: pytest tests/ -q

  frontend:
    name: 前端类型检查与构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: 安装 Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npx tsc --noEmit

      - name: 生产构建
        run: npm run build

  compose:
    name: Docker Compose 配置校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 准备示例配置
        run: |
          cp compose.env.example .env
          cp backend/.env.example backend/.env

      - name: 校验 Compose
        run: docker compose -p grade_tracker config --quiet
