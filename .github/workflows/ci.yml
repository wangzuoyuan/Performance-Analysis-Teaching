name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端测试（pytest）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # 测试用数据目录，避免落到 ~/.exam-tracker
      EXAM_TRACKER_DIR: ${{ runner.temp }}/exam-data
      EXAM_TRACKER_BACKUP_DIR: ${{ runner.temp }}/exam-backups
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx

      - name: 准备数据目录
        run: mkdir -p "$EXAM_TRACKER_DIR" "$EXAM_TRACKER_BACKUP_DIR"

      - name: 运行测试
        run: pytest tests/ -q

  frontend:
    name: 前端类型检查与构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npx tsc --noEmit

      - name: 生产构建
        run: npm run build
